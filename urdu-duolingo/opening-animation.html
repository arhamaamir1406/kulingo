<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assalamu Alaikum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: linear-gradient(148deg, #7A2E0E 0%, #7B3A62 30%, #2B3A90 65%, #0B1852 100%);
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 46%, rgba(255,155,50,0.13) 0%, transparent 100%);
      pointer-events: none;
      animation: ambientPulse 3.5s ease-in-out infinite;
    }
    @keyframes ambientPulse { 0%,100% { opacity:0.6; } 50% { opacity:1.0; } }
    #urduText {
      font-family: 'Noto Nastaliq Urdu', Georgia, serif;
      font-size: clamp(54px, 11vw, 104px);
      font-weight: 700;
      color: #FFFFFF;
      direction: rtl;
      text-align: center;
      line-height: 1.75;
      white-space: nowrap;
      position: relative;
      z-index: 1;
      -webkit-mask-image: linear-gradient(to left, black 0%, transparent 4%);
              mask-image: linear-gradient(to left, black 0%, transparent 4%);
      text-shadow:
        0 0 28px rgba(255,200,100,0.90),
        0 0 55px rgba(255,175,55,0.45),
        0 0 85px rgba(255,140,25,0.22);
    }
    #subtitle {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: clamp(10px, 1.8vw, 14px);
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0);
      direction: ltr;
      position: relative;
      z-index: 1;
      transition: color 1.1s ease;
    }
    #subtitle.visible { color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div id="urduText">اسلام علیکم</div>
  <div id="subtitle">Assalamu Alaikum &nbsp;&middot;&nbsp; Peace be upon you</div>
  <script>
    const textEl = document.getElementById('urduText');
    const subEl  = document.getElementById('subtitle');
    const CHARS    = [...'اسلام علیکم'];
    const N        = CHARS.length;
    const CHAR_DUR = 300;
    const CHAR_GAP = 50;
    const STEP     = CHAR_DUR + CHAR_GAP;
    const TOTAL_MS = (N - 1) * STEP + CHAR_DUR;
    const EDGE_PCT = 4;
    function setMask(p) {
      const pClamped = Math.min(p, 100);
      const edge = Math.min(pClamped + EDGE_PCT, 100);
      const mid  = (pClamped + edge) / 2;
      const grad = `linear-gradient(to left, black 0%, black ${pClamped}%, rgba(0,0,0,0.2) ${mid}%, transparent ${edge}%)`;
      textEl.style.webkitMaskImage = grad;
      textEl.style.maskImage       = grad;
    }
    let startTime = null;
    function revealTick(ts) {
      if (!startTime) startTime = ts;
      const p = Math.min(((ts - startTime) / TOTAL_MS) * 100, 100);
      setMask(p);
      if (p < 100) {
        requestAnimationFrame(revealTick);
      } else {
        textEl.style.webkitMaskImage = '';
        textEl.style.maskImage       = '';
        textEl.style.animation = 'breathe 3s ease-in-out infinite';
        subEl.classList.add('visible');
      }
    }
    function scheduleFlashes() {
      for (let i = 0; i < N; i++) {
        setTimeout(() => {
          textEl.style.filter = 'brightness(1.55)';
          textEl.style.textShadow = '0 0 40px rgba(255,225,120,1), 0 0 80px rgba(255,200,80,0.85), 0 0 120px rgba(255,170,50,0.55)';
          setTimeout(() => {
            textEl.style.filter = '';
            textEl.style.textShadow = '0 0 28px rgba(255,200,100,0.90), 0 0 55px rgba(255,175,55,0.45), 0 0 85px rgba(255,140,25,0.22)';
          }, Math.round(CHAR_DUR * 0.38));
        }, i * STEP);
      }
    }
    const breatheStyle = document.createElement('style');
    breatheStyle.textContent = '@keyframes breathe { 0%,100% { filter:brightness(1.0); } 50% { filter:brightness(1.18); } }';
    document.head.appendChild(breatheStyle);
    document.fonts.ready.then(() => {
      setTimeout(() => { scheduleFlashes(); requestAnimationFrame(revealTick); }, 450);
    });
  </script>
</body>
</html>
